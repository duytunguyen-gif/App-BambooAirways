<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/bamboo-logo-mark.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0b0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="BAV AMT Toolkit" />
    <meta
      name="description"
      content="Bộ công cụ cho thợ máy tàu bay: Fuel, MEL, ôn thi CAAV và tra cứu reset ECAM A320."
    />
    <title>BAV AMT Toolkit</title>
    <!-- Apply the saved/preferred theme BEFORE first paint to avoid a flash of
         the wrong theme. Falls back to the OS preference, then to dark. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("bamboo.theme");
          if (t !== "light" && t !== "dark") {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
